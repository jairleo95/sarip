services:
  postgres:
    image: postgres:15
    container_name: payment_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "max_connections=600", "-c", "shared_buffers=1GB" ]
    networks:
      - payment-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: payment_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sarip.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - payment-network
    depends_on:
      - postgres

  redis:
    image: redis:7
    container_name: payment_cache
    ports:
      - "6379:6379"
    networks:
      - payment-network

  payment_kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: payment_kafka
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://payment_kafka:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr kafka:33145
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    networks:
      - payment-network

  payment_audit_mongo:
    image: mongo:6
    container_name: payment_audit_mongo
    ports:
      - "27017:27017"
    networks:
      - payment-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: payment_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - payment-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: payment_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - payment-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: payment_elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - payment-network

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: payment_logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "12201:12201/udp"
    networks:
      - payment-network
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: payment_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://payment_elasticsearch:9200
    networks:
      - payment-network
    depends_on:
      - elasticsearch

  payment_orchestrator:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: payment_orchestrator
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/payment_db
      - DB_GENERATION=update
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=payment_kafka:9092
      - QUARKUS_REST_CLIENT_SIMULATOR_URL=http://provider_simulator:8084/mock-provider
      - LOGSTASH_HOST=payment_logstash
      - JAVA_OPTS_APPEND=-Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager -DproxySet=false -Dhttp.nonProxyHosts=localhost|127.*|[::1]|provider_simulator|payment_logstash|payment_kafka|postgres|redis|mongodb
    networks:
      - payment-network
    depends_on:
      - postgres
      - redis
      - payment_kafka
      - logstash

  audit_service:
    build:
      context: ./audit-service
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: audit_service
    ports:
      - "8083:8083"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=payment_kafka:9092
      - MONGODB_URL=mongodb://payment_audit_mongo:27017
      - LOGSTASH_HOST=payment_logstash
      - JAVA_OPTS_APPEND=-Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager -DproxySet=false -Dhttp.nonProxyHosts=localhost|127.*|[::1]|provider_simulator|payment_logstash|payment_kafka|postgres|redis|mongodb
    networks:
      - payment-network
    depends_on:
      - payment_kafka
      - payment_audit_mongo
      - logstash

  provider_simulator:
    build:
      context: ./provider-simulator
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: provider_simulator
    ports:
      - "8084:8084"
    environment:
      - LOGSTASH_HOST=payment_logstash
    networks:
      payment-network:
        aliases:
          - provider-simulator
    depends_on:
      - logstash

networks:
  payment-network:
    driver: bridge
