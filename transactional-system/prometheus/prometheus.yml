global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'payment-orchestrator'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['payment_orchestrator:8080']

  - job_name: 'audit-service'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['audit_service:8083']

  - job_name: 'provider-simulator'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['provider_simulator:8084']
