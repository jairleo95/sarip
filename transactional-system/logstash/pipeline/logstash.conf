input {
  gelf {
    port => 12201
    type => gelf
  }
}

filter {
  if [type] == "gelf" {
    # Translate numeric syslog level to human-readable string
    mutate {
      add_field => { "level_name" => "%{level}" }
    }
    mutate {
      gsub => [
        "level_name", "^0$", "EMERG",
        "level_name", "^1$", "ALERT",
        "level_name", "^2$", "CRIT",
        "level_name", "^3$", "ERROR",
        "level_name", "^4$", "WARN",
        "level_name", "^5$", "NOTICE",
        "level_name", "^6$", "INFO",
        "level_name", "^7$", "DEBUG"
      ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "service-payment-logs-%{+YYYY.MM.dd}"
  }
  # For debugging
  # stdout { codec => rubydebug }
}
